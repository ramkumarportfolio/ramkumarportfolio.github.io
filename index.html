<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ram Kumar Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

.hero-container{
width:95%;
margin:auto;
margin-top:40px;
border-radius:25px;
padding:50px 80px;

background:linear-gradient(120deg,#1d4ed8,#020617);
display:flex;
justify-content:space-between;
align-items:center;
min-height:80vh;
position:relative;
overflow:hidden;
}

.navbar{
position:absolute;
top:30px;
left:60px;
right:60px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:600;
}

.nav-links a{
margin-left:30px;
text-decoration:none;
color:white;
opacity:.8;
}

.nav-links a:hover{
opacity:1;
}

.hero-text{
max-width:500px;
}

.welcome{
color:#60a5fa;
margin-bottom:15px;
}

.hero-text h1{
font-size:56px;
line-height:1.2;
}

.hero-text span{
color:#3b82f6;
}

.hero-text p{
margin-top:20px;
opacity:.8;
}

.buttons{
margin-top:35px;
}

.btn{
padding:12px 28px;
border-radius:30px;
text-decoration:none;
margin-right:15px;
}

.btn-primary{
background:#60a5fa;
color:white;
}

.btn-outline{
border:2px solid #60a5fa;
color:white;
}

.hero-image{
position:relative;
}

.profile-frame{
width:340px;
height:430px;
border-radius:180px;
padding:6px;
background:linear-gradient(180deg,#60a5fa,#2563eb);
}

.profile-frame img{
width:100%;
height:100%;
object-fit:cover;
border-radius:180px;
}

.social{
position:absolute;
right:-60px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
}

.social a{
width:40px;
height:40px;
border-radius:50%;
background:#1e3a8a;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-decoration:none;
font-size:14px;
}

.scroll{
position:absolute;
bottom:20px;
left:60px;
opacity:.6;
font-size:14px;
}

</style>
</head>


<body>


<div class="hero-container">


<div class="navbar">

<div class="logo">Ram Kumar</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Portfolio</a>
<a href="#">Testimonials</a>
<a href="#">Contact</a>
</div>

</div>



<div class="hero-text">

<p class="welcome">Welcome to my portfolio!</p>

<h1>Hello, my name's <span>Ram</span>.</h1>

<p>
Senior Mobile App Developer with 10+ years experience building
Android, Kotlin, Flutter and React Native applications.
</p>

<div class="buttons">

<a class="btn btn-primary" href="#">View My Apps</a>

<a class="btn btn-outline" href="#">Contact Me</a>

</div>

</div>



<div class="hero-image">

<div class="profile-frame">
<img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e">
</div>


<div class="social">
<a href="#">in</a>
<a href="#">gh</a>
<a href="#">tw</a>
</div>

</div>


<div class="scroll">Scroll Down</div>


</div>


</body>
</html>
